<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiba AI - Modern Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- د شالید ښکلا (Glow Effects) -->
    <div class="bg-glow glow-top"></div>
    <div class="bg-glow glow-bottom"></div>

    <!-- د ننوتلو (Welcome) سکرین -->
    <div id="welcome-screen" class="welcome-container">
        <div class="welcome-card">
            <div class="welcome-logo">
                <i class="fas fa-sparkles"></i>
            </div>
            <h1>Hiba AI ته ښه راغلاست</h1>
            <p>د پیل کولو لپاره مهرباني وکړئ خپل نوم ولیکئ</p>
            <div class="input-group">
                <input type="text" id="user-name-input" placeholder="ستا نوم څه دی؟" autocomplete="off">
                <button id="start-btn">پیل کول <i class="fas fa-arrow-left"></i></button>
            </div>
        </div>
    </div>

    <!-- اصلي چټ سکرین (په ډیفالټ ډول پټ دی) -->
    <div id="main-chat" class="main-layout hidden">
        <header class="app-header">
            <div class="header-brand">
                <div class="ai-avatar"><i class="fas fa-sparkles"></i></div>
                <div>
                    <h2>Hiba AI</h2>
                    <span class="status-dot"></span> <span style="font-size: 12px; color: #888;">آنلاین</span>
                </div>
            </div>
            <!-- د بېکاره بټنو پر ځای مو یوازې مینو پرېښوده -->
            <button class="menu-btn"><i class="fas fa-ellipsis-h"></i></button>
        </header>

        <div id="chat-content" class="chat-content">
            <!-- پیغامونه به دلته راځي -->
        </div>

        <div id="typing-indicator" class="typing-indicator">
            هبا ځواب لیکي <span class="dots">...</span>
        </div>

        <div class="input-area">
            <div class="input-box">
                <input type="file" id="file-input" hidden accept="image/*">
                <button class="attach-btn" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-plus"></i>
                </button>
                <input type="text" id="user-input" placeholder="خپل پیغام ولیکئ..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
